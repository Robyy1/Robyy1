<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Pasta Loading Animation</title>
    <style>
        :root {
            --bg-color: #f8ecd4;
            --pot-color: #cfd1c6;
            --pot-rim: #c8cac0;
            --pasta-light: #F4D06F;
            --pasta-dark: #D4B98A;
            --tongs-color: #d2ad72;
            --steam-color: #FFFFFF;
            --shadow-color: rgba(180, 160, 140, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: sans-serif;
        }

        .loader-container {
            width: 300px;
            height: 300px;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .pot-group {
            transform-origin: 100px 170px;
            animation: potEntrance 7s ease-in-out infinite;
        }

        .bubble {
            fill: rgba(255, 255, 255, 0.4);
            opacity: 0;
        }
        .bubble-1 { animation: bubbleRise 7s ease-out infinite; animation-delay: 1.2s; }
        .bubble-2 { animation: bubbleRise 7s ease-out infinite; animation-delay: 1.5s; }
        .bubble-3 { animation: bubbleRise 7s ease-out infinite; animation-delay: 1.8s; }

        .tongs-group {
            transform-origin: 200px 0px;
            transform: translate(50px, -50px) rotate(-10deg);
            animation: tongsMove 7s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
        }

        .pasta-lift-group {
            transform: translateY(60px);
            animation: pastaLift 7s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
        }

        .steam {
            fill: none;
            stroke: var(--steam-color);
            stroke-width: 3;
            stroke-linecap: round;
            opacity: 0;
            filter: blur(4px);
        }
        .steam-1 { animation: steamRise 7s ease-out infinite; animation-delay: 3.5s; }
        .steam-2 { animation: steamRise 7s ease-out infinite; animation-delay: 3.8s; }

        .pot-shadow {
            fill: var(--shadow-color);
            transform-origin: 100px 180px;
            animation: shadowFade 7s ease-in-out infinite;
        }

        @keyframes potEntrance {
            0%, 100% { opacity: 0; transform: scale(0.95); }
            10%, 90% { opacity: 1; transform: scale(1); }
        }

        @keyframes shadowFade {
            0%, 100% { opacity: 0; transform: scale(0.8); }
            10%, 90% { opacity: 1; transform: scale(1); }
        }

        @keyframes bubbleRise {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            5% { opacity: 1; }
            20% { transform: translateY(-20px) scale(1.1); opacity: 0; }
            100% { transform: translateY(-20px) scale(1.1); opacity: 0; }
        }

        @keyframes tongsMove {
            0%, 20% { transform: translate(50px, -50px) rotate(-10deg); }
            30% { transform: translate(0px, 10px) rotate(0deg); }
            40%, 70% { transform: translate(0px, -40px) rotate(0deg); }
            80% { transform: translate(0px, 10px) rotate(0deg); }
            90%, 100% { transform: translate(50px, -50px) rotate(-10deg); }
        }

        @keyframes pastaLift {
            0%, 20% { transform: translateY(60px); opacity: 0; }
            21% { opacity: 1; }
            30% { transform: translateY(60px); }
            40%, 70% { transform: translateY(0px); }
            80% { transform: translateY(60px); opacity: 1; }
            81%, 100% { opacity: 0; }
        }

        @keyframes steamRise {
            0% { opacity: 0; transform: translateY(120px) scaleX(0.5); stroke-dasharray: 0 20; }
            20% { opacity: 0.6; }
            60% { opacity: 0; transform: translateY(60px) scaleX(1.5); stroke-dasharray: 20 20; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="pastaTexture" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse">
                    <path d="M0 7.5 Q 3.75 0, 7.5 7.5 T 15 7.5" fill="none" stroke="var(--pasta-dark)" stroke-width="2" />
                </pattern>
                
                <clipPath id="potClip">
                     <ellipse cx="100" cy="135" rx="45" ry="10" />
                </clipPath>

                <clipPath id="liftClip">
                    <rect x="0" y="0" width="200" height="145" />
                </clipPath>
            </defs>

            <ellipse class="pot-shadow" cx="100" cy="180" rx="45" ry="6" />

            <g class="pot-group">
                <path d="M55,135 L55,160 Q55,180 100,180 Q145,180 145,160 L145,135 Z" fill="#b1b3a8" /> 
                
                <g clip-path="url(#potClip)">
                    <ellipse cx="100" cy="138" rx="45" ry="10" fill="var(--pasta-light)" />
                    <rect x="55" y="125" width="90" height="20" fill="url(#pastaTexture)" />
                </g>

                <circle class="bubble bubble-1" cx="90" cy="140" r="2" />
                <circle class="bubble bubble-2" cx="110" cy="142" r="1.5" />
                <circle class="bubble bubble-3" cx="100" cy="138" r="2.5" />

                <g clip-path="url(#liftClip)">
                    <g class="pasta-lift-group">
                        <path d="M85,140 Q100,70 115,140" fill="none" stroke="var(--pasta-light)" stroke-width="6" stroke-linecap="round" />
                        <path d="M90,140 Q100,85 110,140" fill="none" stroke="var(--pasta-dark)" stroke-width="2" stroke-linecap="round" />
                    </g>
                </g>

                <path d="M55,135 Q55,145 100,145 Q145,145 145,135 L145,160 Q145,180 100,180 Q55,180 55,160 Z" fill="var(--pot-color)" opacity="0.95" />
                
                <g class="steam-group">
                    <path class="steam steam-1" d="M85,120 Q75,100 85,80" />
                    <path class="steam steam-2" d="M115,120 Q125,100 115,80" />
                </g>
            </g>

            <g class="tongs-group">
                <rect x="96" y="60" width="5" height="75" fill="var(--tongs-color)" rx="2" transform="rotate(-8 100 80)" />
                <rect x="98" y="60" width="5" height="75" fill="#c49a56" rx="2" transform="rotate(8 100 80)" />
            </g>
        </svg>
    </div>

</body>
</html>
