<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Sushi Loading Animation</title>
    <style>
        :root {
            --bg-color: #f8ecd4;
            --nori-color: #1A1A1A;
            --rice-color: #FFFFFF;
            --tuna-color: #FF6B6B;
            --wood-color: #D2B48C;
            --plate-main: #FFFFFF;
            --plate-shadow: #E5E2DA;
            --plate-inner: #F2F0EB;
            --shadow-color: rgba(0, 0, 0, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        .loader-container {
            width: 300px;
            height: 300px;
            position: relative;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .tall-stack {
            animation: slide-plate-out 7s infinite ease;
        }

        .plate-group {
            animation: slide-plate-in 7s infinite ease;
        }

        .plate-visuals {
            transform: translateY(-10px);
        }

        .falling-maki {
            animation: maki-drop 7s infinite ease-in;
            animation-fill-mode: backwards;
        }

        .maki-1 { animation-delay: 0.6s; }
        .maki-2 { animation-delay: 0.8s; }
        .maki-3 { animation-delay: 1.0s; }
        .maki-4 { animation-delay: 1.2s; }
        .maki-5 { animation-delay: 1.4s; }
        .maki-5-pickup { 
            animation: maki-drop-and-lift 7s infinite ease-in;
            animation-delay: 1.4s; 
            animation-fill-mode: backwards;
        }

        .chopsticks {
            animation: chopstick-slide 7s infinite ease-out;
            animation-delay: 1.35s;
            animation-fill-mode: backwards;
            opacity: 0;
            transform-origin: 150px 80px;
        }

        .stick-top {
            animation: chopstick-pinch-top 7s infinite ease-out;
        }

        .stick-bottom {
            animation: chopstick-pinch-bottom 7s infinite ease;
        }

        @keyframes maki-drop {
            0% { transform: translateY(-200px) scaleY(0.7); opacity: 0; }
            5% { opacity: 1; }
            11% { transform: translateY(-30px) scaleY(1.2); }
            13% { transform: translateY(-5px) scaleY(0.9); }
            15%, 67% { transform: translateY(0) scaleY(1); opacity: 1; }
            68%, 100% { opacity: 0; transform: translateY(-200px); }
        }

        @keyframes maki-drop-and-lift {
            0% { transform: translateY(-200px) scaleY(0.7); opacity: 0; }
            5% { opacity: 1; }
            11% { transform: translateY(-30px) scaleY(1.11); }
            13% { transform: translateY(-2.5px) scaleY(0.95); }
            15%, 42% { transform: translateY(0) scaleY(1); opacity: 1; }
            50%, 65% { transform: translateY(-25px) rotate(-5deg); opacity: 1; }
            68%, 100% { opacity: 0; transform: translateY(-200px); }
        }

        @keyframes slide-plate-in {
            0% { transform: translateX(200px); }
            15%, 100% { transform: translateX(0); }
        }

        @keyframes slide-plate-out {
            0%, 65% { transform: translateX(0); }
            80%, 100% { transform: translateX(-350px); }
        }

        @keyframes chopstick-slide {
            0%, 25% { transform: translateX(150px) rotate(10deg); opacity: 0; }
            35% { transform: translateX(0) rotate(0deg); opacity: 1; }
            45% { transform: translateY(0); opacity: 1; }
            50%, 65% { transform: translateY(-15px) rotate(-5deg); opacity: 1; }
            75%, 100% { transform: translateX(-250px); opacity: 0; }
        }

        @keyframes chopstick-pinch-top {
            0%, 72% { transform: translateY(0) rotate(0deg); }
            84%, 85% { transform: translateY(10px) rotate(-4deg); }
            90% { transform: translateY(0) rotate(0deg); }
        }

        @keyframes chopstick-pinch-bottom {
            0%, 42% { transform: translateY(0) rotate(0deg); }
            48%, 65% { transform: translateY(-11px) rotate(4deg); }
            70% { transform: translateY(0) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <svg viewBox="0 0 200 200">
            <g class="tall-stack">
                <g class="plate-group">
                    <g class="plate-visuals">
                        <rect x="25" y="152" width="150" height="10" rx="5" fill="var(--shadow-color)" />
                        <path d="M25 150 Q25 140 35 140 H165 Q175 140 175 150 V152 Q175 160 165 160 H35 Q25 160 25 152 Z" fill="var(--plate-shadow)" />
                        <path d="M25 148 Q25 138 35 138 H165 Q175 138 175 148 V150 Q175 158 165 158 H35 Q25 158 25 150 Z" fill="var(--plate-main)" />
                        <rect x="35" y="142" width="130" height="8" rx="4" fill="var(--plate-inner)" />
                        <rect x="30" y="140" width="40" height="2" rx="1" fill="white" opacity="0.6" />
                    </g>
                    
                    <g class="falling-maki maki-1">
                        <rect x="49" y="114" width="32" height="26" rx="8" fill="var(--nori-color)" />
                        <rect x="53" y="116" width="24" height="4" rx="2" fill="var(--rice-color)" opacity="0.9" />
                        <rect x="61" y="116" width="8" height="3" rx="1.5" fill="var(--tuna-color)" />
                    </g>
                    
                    <g class="falling-maki maki-2">
                        <rect x="84" y="114" width="32" height="26" rx="8" fill="var(--nori-color)" />
                        <rect x="88" y="116" width="24" height="4" rx="2" fill="var(--rice-color)" opacity="0.9" />
                        <rect x="96" y="116" width="8" height="3" rx="1.5" fill="var(--tuna-color)" />
                    </g>
                    
                    <g class="falling-maki maki-3">
                        <rect x="119" y="114" width="32" height="26" rx="8" fill="var(--nori-color)" />
                        <rect x="123" y="116" width="24" height="4" rx="2" fill="var(--rice-color)" opacity="0.9" />
                        <rect x="131" y="116" width="8" height="3" rx="1.5" fill="var(--tuna-color)" />
                    </g>

                    <g class="falling-maki maki-4">
                        <rect x="66.5" y="88" width="32" height="26" rx="8" fill="var(--nori-color)" />
                        <rect x="70.5" y="90" width="24" height="4" rx="2" fill="var(--rice-color)" opacity="0.9" />
                        <rect x="78.5" y="90" width="8" height="3" rx="1.5" fill="var(--tuna-color)" />
                    </g>

                    <g class="maki-5-pickup maki-5">
                        <rect x="101.5" y="88" width="32" height="26" rx="8" fill="var(--nori-color)" />
                        <rect x="105.5" y="90" width="24" height="4" rx="2" fill="var(--rice-color)" opacity="0.9" />
                        <rect x="113.5" y="90" width="8" height="3" rx="1.5" fill="var(--tuna-color)" />
                    </g>
                </g>

                <g class="chopsticks">
                    <line class="stick-top" x1="105" y1="87" x2="205" y2="80" stroke="var(--wood-color)" stroke-width="4" stroke-linecap="round" />
                    <line class="stick-bottom" x1="105" y1="117" x2="205" y2="92" stroke="var(--wood-color)" stroke-width="4" stroke-linecap="round" />
                </g>
            </g>
        </svg>
    </div>

</body>
</html>
